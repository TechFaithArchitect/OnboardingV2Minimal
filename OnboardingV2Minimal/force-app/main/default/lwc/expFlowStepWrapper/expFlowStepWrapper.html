<template>
    <div class="slds-m-bottom_small">
        <div class={headerClass}>
            <template if:true={hasHeading}>
                <div class="slds-text-heading_medium">
                    <lightning-formatted-rich-text value={heading}></lightning-formatted-rich-text>
                </div>
            </template>
            <template if:true={hasHelperText}>
                <div class="slds-m-top_x-small slds-text-body_small">
                    <lightning-formatted-rich-text value={helperText}></lightning-formatted-rich-text>
                </div>
            </template>
        </div>
    </div>
</template>
