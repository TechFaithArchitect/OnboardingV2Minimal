<template>
    <lightning-card title="Vendor Customization">
        <div class="slds-p-around_small">
            <template if:true={hasOptions}>
                <lightning-combobox
                    name="vendorCustomization"
                    label="Select Vendor Customization"
                    value={selectedVendorProgramId}
                    options={options}
                    placeholder="Choose a vendor customization"
                    onchange={handleSelectionChange}
                    disabled={isSaving}
                >
                </lightning-combobox>

                <div class="slds-m-top_small slds-grid slds-grid_align-spread slds-align_absolute-center">
                    <p class="slds-text-body_small slds-text-color_weak">Selected: {selectedLabel}</p>
                    <lightning-button
                        variant="brand"
                        label="Save"
                        onclick={handleSave}
                        disabled={isSaveDisabled}
                    >
                    </lightning-button>
                </div>
            </template>

            <template if:false={hasOptions}>
                <p class="slds-text-body_regular">No vendor customizations found.</p>
            </template>
        </div>

        <template if:true={isSaving}>
            <lightning-spinner alternative-text="Saving" size="small"></lightning-spinner>
        </template>
    </lightning-card>
</template>
